  <style>
    :root {

      --bg-deep: #02070a;

      --cyan-soft: rgba(142, 232, 255, 0.23);
      --cyan-faint: rgba(142, 232, 255, 0.09);
      --gold: rgba(229, 215, 176, 0.84);
      --text: rgba(242, 250, 255, 0.92);
      --muted: rgba(170, 220, 235, 0.62);

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--notion-bg);
      color: var(--text);
      font-family: Calibri, Arial, Helvetica, sans-serif;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #191919;
    }

    .fit {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1086px;
      height: 1448px;
      transform-origin: center center;
      will-change: transform;
    }

    .system {
      position: relative;
      width: 1086px;
      height: 1448px;
      overflow: hidden;
      border: 1px solid rgba(142,232,255,0.22);
      background:
        radial-gradient(circle at 50% 22%, rgba(142,232,255,0.09), transparent 19%),
        radial-gradient(circle at 50% 91%, rgba(142,232,255,0.13), transparent 22%),
        radial-gradient(circle at 17% 68%, rgba(30,145,185,0.10), transparent 30%),
        radial-gradient(circle at 83% 68%, rgba(30,145,185,0.09), transparent 28%),

        inset 0 0 80px rgba(0,0,0,0.78),
        inset 0 0 42px rgba(142,232,255,0.035),
        0 0 12px rgba(142,232,255,0.08);
      isolation: isolate;
    }

    .system::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.30;
      background-image:
        radial-gradient(circle, rgba(170, 245, 255, 0.65) 0 0.9px, transparent 1.8px),
        radial-gradient(circle, rgba(255, 235, 190, 0.35) 0 0.7px, transparent 1.5px);
      background-size: 52px 52px, 121px 121px;
      background-position: 0 0, 39px 21px;
      animation: starDrift 42s linear infinite;
      z-index: 0;

    .nebula {
      position: absolute;
      inset: -4%;

      pointer-events: none;
      opacity: 0.45;
      background:

        radial-gradient(ellipse at 82% 50%, rgba(70,210,255,0.10), transparent 31%);

    .grain {

    .frame .corner {
      position: absolute;

    .arc-group-1 { animation: rotateCW 74s linear infinite; transform-origin: 490px 490px; }
    .arc-group-2 { animation: rotateCCW 96s linear infinite; transform-origin: 490px 490px; }

      stroke: rgba(142,232,255,0.18);
      stroke-width: 1.1;

    .dragon-eye {
      position: absolute;
      left: 157px;
      top: 118px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.96), rgba(142,232,255,0.84) 27%, transparent 64%);
      filter: drop-shadow(0 0 9px rgba(142,232,255,0.95));
      animation: eyePulse 2.4s ease-in-out infinite;
    }

    .spine {
      position: absolute;
      left: 50%;
      top: 0;
      width: 2px;
      height: 100%;
      transform: translateX(-50%);
      z-index: 3;
      pointer-events: none;
      background: linear-gradient(
        180deg,
        transparent 0%,
        rgba(142,232,255,0.16) 9%,
        rgba(255,255,255,0.82) 16%,
        rgba(142,232,255,0.20) 35%,
        rgba(142,232,255,0.16) 72%,
        rgba(255,255,255,0.86) 92%,

      animation: spinePulse 4s ease-in-out infinite;
    }

    .top-node {
      position: absolute;
      left: 50%;
      top: 205px;
      width: 104px;
      height: 104px;
      transform: translate(-50%, -50%);
      z-index: 5;
      pointer-events: none;
    }
    .top-node::before, .top-node::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(210,250,255,0.48);
      box-shadow: 0 0 14px rgba(142,232,255,0.26), inset 0 0 10px rgba(142,232,255,0.12);

    .top-node::before { animation: rotateCW 9s linear infinite; }
    .top-node::after { inset: 18px; animation: rotateCCW 7s linear infinite; }

      top: 50%;
      width: 24px;
      height: 24px;
      transform: translate(-50%, -50%);

      background: radial-gradient(circle, #fff, #9ceeff 40%, transparent 72%);
      box-shadow: 0 0 16px rgba(255,255,255,0.82), 0 0 42px rgba(142,232,255,0.80);
      animation: orbPulse 2.7s ease-in-out infinite;

    .woven {
      position: absolute;
      left: 50%;
      top: 52px;
      width: 150px;
      height: 290px;
      transform: translateX(-50%);
      z-index: 4;
      pointer-events: none;
      opacity: 0.58;
      mix-blend-mode: screen;
    }
    .woven svg { width: 100%; height: 100%; overflow: visible; }
    .woven path {
      fill: none;
      stroke: rgba(160,240,255,0.46);
      stroke-width: 1.2;
      stroke-linecap: round;
      stroke-dasharray: 5 14;
      filter: drop-shadow(0 0 7px rgba(142,232,255,0.36));

    .woven path:nth-child(3) { animation-duration: 11s; opacity: 0.5; }

    .runes {

      z-index: 6;

      height: 390px;

      font-family: Consolas, "Courier New", monospace;
      font-size: 16px;
      line-height: 1.08;
      text-shadow: 0 0 9px rgba(142,232,255,0.26);
      white-space: pre;
      overflow: hidden;
      user-select: none;
      mix-blend-mode: screen;
      animation: runeFlicker 2.4s steps(8,end) infinite;
    }
    .runes.left { left: 24px; }
    .runes.right { right: 24px; }
    .runes .inner { writing-mode: vertical-rl; text-orientation: mixed; }

    .title-block {
      position: absolute;
      left: 0;
      right: 0;
      top: 515px;
      z-index: 6;

    .title {

      font-size: 96px;
      font-weight: 400;
      line-height: 0.92;
      letter-spacing: 0.22em;
      color: rgba(245,252,255,0.96);
      text-shadow:

        0 0 20px rgba(142,232,255,0.34),

    .subtitle {

      letter-spacing: 0.42em;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(142,232,255,0.30);
    }
    .divider {
      margin: 26px auto 0;
      width: 300px;
      height: 24px;
      position: relative;

    .divider::before, .divider::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 125px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(142,232,255,0.65));
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; transform: scaleX(-1); }
    .divider span {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 20px;
      height: 20px;
      transform: translate(-50%, -50%) rotate(45deg);
      border: 1px solid rgba(142,232,255,0.80);
      box-shadow: 0 0 10px rgba(142,232,255,0.36);
    }

    .menu-grid {
      position: absolute;
      left: 50%;
      top: 770px;
      width: 760px;
      transform: translateX(-50%);
      z-index: 10;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 34px 40px;
    }
    .menu-card {
      position: relative;
      min-height: 146px;
      display: grid;
      place-items: center;
      align-content: center;
      text-decoration: none;
      color: var(--text);
      background: transparent;
      border: 0;
      overflow: visible;
      isolation: isolate;
    }
    .menu-card::before {
      content: "";
      position: absolute;
      inset: -4px;
      opacity: 0;
      border: 1px solid rgba(142,232,255,0.20);
      background: radial-gradient(ellipse at center, rgba(142,232,255,0.08), transparent 64%);
      box-shadow: 0 0 18px rgba(142,232,255,0.10), inset 0 0 18px rgba(142,232,255,0.04);
      transition: opacity .18s ease, transform .18s ease;
      transform: scale(0.98);
      z-index: -1;
    }
    .menu-card:hover::before, .menu-card:focus-visible::before { opacity: 1; transform: scale(1); }
    .menu-card:hover .menu-icon, .menu-card:focus-visible .menu-icon {
      color: rgba(250,245,220,0.98);
      filter: drop-shadow(0 0 12px rgba(142,232,255,0.22));
      transform: translateY(-2px);
    }
    .menu-card:hover .menu-label, .menu-card:focus-visible .menu-label {
      color: rgba(255,255,255,0.96);
      text-shadow: 0 0 12px rgba(142,232,255,0.28);
    }
    .menu-icon {
      width: 60px;
      height: 60px;
      color: var(--gold);
      margin-bottom: 18px;
      filter: drop-shadow(0 0 8px rgba(142,232,255,0.08));
      transition: transform .18s ease, color .18s ease, filter .18s ease;
    }
    .menu-icon svg { width: 100%; height: 100%; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .menu-label {
      color: rgba(242,250,255,0.86);
      font-size: 18px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      transition: color .18s ease, text-shadow .18s ease;
    }
    .menu-underline {
      width: 28px;
      height: 1px;
      margin-top: 15px;
      background: rgba(230,245,255,0.56);
      box-shadow: 0 0 8px rgba(142,232,255,0.23);

    .card-corner {

      border-color: rgba(142,232,255,0.11);
      border-style: solid;

    .card-corner.tl { left: -12px; top: 0; border-width: 1px 0 0 1px; }
    .card-corner.tr { right: -12px; top: 0; border-width: 1px 1px 0 0; }
    .card-corner.br { right: -12px; bottom: 0; border-width: 0 1px 1px 0; }
    .card-corner.bl { left: -12px; bottom: 0; border-width: 0 0 1px 1px; }

    .sigil-circle, .sigil-line, .sigil-glyph {

    .sigil-faint { opacity: 0.34; }

    .ruins {

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; }
    }

  <script>
    function fitToViewport() {
      const inner = document.getElementById("fit");
      const padding = 8;
      const naturalWidth = 1086;
      const naturalHeight = 1448;
      const scale = Math.min(
        (window.innerWidth - padding) / naturalWidth,
        (window.innerHeight - padding) / naturalHeight,
        1
      );
      inner.style.transform = `translate(-50%, -50%) scale(${Math.max(scale, 0.35)})`;
    }

    window.addEventListener("resize", fitToViewport);
    window.addEventListener("load", fitToViewport);
    requestAnimationFrame(fitToViewport);

    const glyphPool = ["ᚠ","ᚢ","ᚦ","ᚨ","ᚱ","ᚲ","ᚷ","ᛉ","ᛋ","ᛏ","ᛒ","ᛖ","ᛗ","ᛟ","⌬","⌖","⟡","⋄","⊹","⟢","⟣","⟁","⟐","○","◌"];

    function makeRuneColumn(lines = 34) {
      const out = [];
      for (let i = 0; i < lines; i++) {
        const len = 1 + Math.floor(Math.random() * 3);
        let group = "";
        for (let j = 0; j < len; j++) {
          group += glyphPool[Math.floor(Math.random() * glyphPool.length)];
        }
        out.push(group);
      }
      return out.join("\n");
    }

    function updateRunes() {
      document.getElementById("runesLeft").textContent = makeRuneColumn();
      document.getElementById("runesRight").textContent = makeRuneColumn();
    }

    updateRunes();
    setInterval(updateRunes, 1400);
  </script>

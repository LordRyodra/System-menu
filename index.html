<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ryo System Hauptmenü</title>
  <style>
    :root {
      --notion-bg: #191919;
      --deep: #02070a;
      --deep-2: #061014;
      --cyan: rgba(142, 232, 255, 0.78);
      --cyan-strong: rgba(218, 252, 255, 0.96);
      --cyan-soft: rgba(142, 232, 255, 0.24);
      --cyan-faint: rgba(142, 232, 255, 0.08);
      --gold: rgba(230, 216, 178, 0.83);
      --text: rgba(242, 250, 255, 0.93);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--notion-bg);
      font-family: Calibri, Arial, Helvetica, sans-serif;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #191919;
    }

    .fit {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1086px;
      height: 1448px;
      transform-origin: center center;
      will-change: transform;
    }

    .system {
      position: relative;
      width: 1086px;
      height: 1448px;
      overflow: hidden;
      border: 1px solid rgba(142,232,255,0.22);
      background:
        radial-gradient(ellipse at 50% 24%, rgba(102, 221, 255, 0.105), transparent 24%),
        radial-gradient(ellipse at 50% 82%, rgba(102, 221, 255, 0.08), transparent 34%),
        linear-gradient(180deg, rgba(7, 16, 20, 0.96), rgba(2, 8, 11, 0.985) 54%, rgba(3, 8, 11, 1));
      box-shadow:
        inset 0 0 90px rgba(0,0,0,0.86),
        inset 0 0 38px rgba(142,232,255,0.045),
        0 0 14px rgba(142,232,255,0.08);
      isolation: isolate;
      color: var(--text);
    }

    .stars,
    .dust,
    .mist,
    .glyph-noise {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .stars {
      z-index: 0;
      opacity: 0.34;
      background-image:
        radial-gradient(circle, rgba(180, 252, 255, 0.76) 0 0.8px, transparent 1.7px),
        radial-gradient(circle, rgba(255, 236, 190, 0.38) 0 0.65px, transparent 1.5px);
      background-size: 48px 48px, 113px 113px;
      background-position: 0 0, 33px 26px;
      animation: starDrift 48s linear infinite;
    }

    .dust {
      z-index: 1;
      opacity: 0.22;
      background:
        radial-gradient(ellipse at 18% 58%, rgba(90, 220, 255, 0.17), transparent 32%),
        radial-gradient(ellipse at 83% 57%, rgba(90, 220, 255, 0.14), transparent 34%),
        radial-gradient(ellipse at 50% 42%, rgba(140, 235, 255, 0.08), transparent 42%);
      filter: blur(18px);
      animation: nebulaBreathe 12s ease-in-out infinite;
    }

    .mist {
      z-index: 2;
      opacity: 0.18;
      background:
        linear-gradient(115deg, transparent, rgba(255,255,255,0.06), transparent 42%),
        repeating-linear-gradient(0deg, transparent 0 21px, rgba(142,232,255,0.018) 22px, transparent 23px);
      transform: translateX(-120%);
      mix-blend-mode: screen;
      animation: slowMist 13s ease-in-out infinite;
    }

    .glyph-noise {
      z-index: 3;
      opacity: 0.06;
      background:
        repeating-linear-gradient(90deg, transparent 0 34px, rgba(142,232,255,0.12) 35px, transparent 36px),
        repeating-linear-gradient(0deg, transparent 0 51px, rgba(142,232,255,0.08) 52px, transparent 53px);
      mix-blend-mode: screen;
    }

    .frame {
      position: absolute;
      inset: 18px;
      z-index: 20;
      pointer-events: none;
      border: 1px solid rgba(142,232,255,0.20);
      box-shadow: inset 0 0 34px rgba(142,232,255,0.028);
    }

    .frame::before,
    .frame::after {
      content: "";
      position: absolute;
      width: 130px;
      height: 130px;
      border-color: rgba(142,232,255,0.45);
      border-style: solid;
      filter: drop-shadow(0 0 8px rgba(142,232,255,0.18));
    }
    .frame::before { left: 14px; top: 14px; border-width: 2px 0 0 2px; }
    .frame::after { right: 14px; bottom: 14px; border-width: 0 2px 2px 0; }

    .frame-extra {
      position: absolute;
      inset: 28px;
      z-index: 21;
      pointer-events: none;
    }
    .frame-extra::before,
    .frame-extra::after {
      content: "";
      position: absolute;
      width: 110px;
      height: 82px;
      border-color: rgba(142,232,255,0.42);
      border-style: solid;
    }
    .frame-extra::before { right: 0; top: 0; border-width: 2px 2px 0 0; }
    .frame-extra::after { left: 0; bottom: 0; border-width: 0 0 2px 2px; }

    .arcfield {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      mix-blend-mode: screen;
    }
    .arcfield svg {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .arc {
      fill: none;
      stroke: rgba(142,232,255,0.18);
      stroke-width: 1.05;
      vector-effect: non-scaling-stroke;
    }
    .arc.gold { stroke: rgba(230,216,178,0.22); }
    .arc.faint { stroke: rgba(142,232,255,0.09); }
    .arc.dash { stroke-dasharray: 4 13; animation: dashFlow 16s linear infinite; }
    .arc.dash2 { stroke-dasharray: 20 18; animation: dashFlow 22s linear infinite reverse; }
    .tick {
      stroke: rgba(142,232,255,0.16);
      stroke-width: 1;
      vector-effect: non-scaling-stroke;
      animation: tickPulse 5s ease-in-out infinite;
    }
    .tick.major { stroke: rgba(210,250,255,0.30); stroke-width: 1.2; }
    .arc-rot-a { animation: rotateCW 90s linear infinite; transform-origin: 543px 415px; }
    .arc-rot-b { animation: rotateCCW 120s linear infinite; transform-origin: 543px 415px; }

    .dragon {
      position: absolute;
      left: 50%;
      top: 72px;
      width: 760px;
      height: 760px;
      transform: translateX(-50%);
      z-index: 5;
      opacity: 0.50;
      pointer-events: none;
      mix-blend-mode: normal;
      will-change: opacity, filter;
      filter:
        brightness(0.70)
        contrast(1.38)
        saturate(0.90)
        drop-shadow(0 0 12px rgba(142,232,255,0.065))
        drop-shadow(0 0 54px rgba(0,0,0,0.88));
      -webkit-mask-image:
        radial-gradient(ellipse at center, black 0 62%, rgba(0,0,0,0.90) 78%, transparent 95%);
      mask-image:
        radial-gradient(ellipse at center, black 0 62%, rgba(0,0,0,0.90) 78%, transparent 95%);
      animation: dragonBreathe 8.5s ease-in-out infinite;
    }

    .dragon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .dragon::before {
      content: "";
      position: absolute;
      inset: 16%;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(2, 12, 16, 0.60), transparent 66%);
      filter: blur(20px);
      z-index: -1;
      opacity: 0.78;
    }

    .dragon::after {
      content: "";
      position: absolute;
      inset: 4%;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at 34% 35%, rgba(142,232,255,0.045), transparent 24%),
        radial-gradient(ellipse at 57% 54%, rgba(2,10,13,0.24), transparent 48%);
      opacity: 0.42;
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .dragon-eye-overlay::after {
      content: "";
      position: absolute;
      inset: -22%;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(150,240,255,0.16) 0%, rgba(150,240,255,0.06) 45%, transparent 72%);
      filter: blur(4px);
      opacity: 0.78;
      z-index: -1;
    }

    .spine {
      position: absolute;
      left: 50%;
      top: 0;
      width: 2px;
      height: 100%;
      transform: translateX(-50%);
      z-index: 7;
      pointer-events: none;
      background: linear-gradient(180deg, transparent, rgba(142,232,255,0.18) 8%, rgba(255,255,255,0.82) 16%, rgba(142,232,255,0.20) 45%, rgba(142,232,255,0.13) 75%, rgba(255,255,255,0.88) 93%, transparent);
      filter: drop-shadow(0 0 13px rgba(142,232,255,0.72));
      animation: spinePulse 4.2s ease-in-out infinite;
    }

    .top-node {
      position: absolute;
      left: 50%;
      top: 205px;
      width: 126px;
      height: 126px;
      transform: translate(-50%, -50%);
      z-index: 9;
      pointer-events: none;
      mix-blend-mode: screen;
    }
    .top-node .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(205,250,255,0.52);
      box-shadow: 0 0 12px rgba(142,232,255,0.24), inset 0 0 10px rgba(142,232,255,0.10);
    }
    .top-node .r1 { inset: 0; animation: rotateCW 12s linear infinite; }
    .top-node .r2 { inset: 18px; animation: rotateCCW 8s linear infinite; }
    .top-node .r3 { inset: 36px; animation: rotateCW 5s linear infinite; }
    .top-node .core {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 24px;
      height: 24px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, #fff, #9ceeff 40%, transparent 72%);
      box-shadow: 0 0 16px rgba(255,255,255,0.86), 0 0 44px rgba(142,232,255,0.82);
      animation: orbPulse 2.8s ease-in-out infinite;
    }

    .woven {
      position: absolute;
      left: 50%;
      top: 50px;
      width: 170px;
      height: 320px;
      transform: translateX(-50%);
      z-index: 8;
      pointer-events: none;
      opacity: 0.60;
      mix-blend-mode: screen;
    }
    .woven svg { width: 100%; height: 100%; overflow: visible; }
    .woven path {
      fill: none;
      stroke: rgba(164,240,255,0.44);
      stroke-width: 1.25;
      stroke-linecap: round;
      stroke-dasharray: 5 15;
      filter: drop-shadow(0 0 8px rgba(142,232,255,0.28));
      animation: dashFlow 7s linear infinite;
    }
    .woven path:nth-child(2) { animation-direction: reverse; animation-duration: 9s; opacity: 0.75; }
    .woven path:nth-child(3) { animation-duration: 13s; opacity: 0.50; }

    .runes {
      position: absolute;
      z-index: 12;
      top: 395px;
      width: 36px;
      height: 430px;
      color: rgba(155,232,255,0.38);
      font-family: Consolas, "Courier New", monospace;
      font-size: 15px;
      line-height: 1.08;
      text-shadow: 0 0 9px rgba(142,232,255,0.25);
      white-space: pre;
      overflow: hidden;
      user-select: none;
      mix-blend-mode: screen;
      animation: runeFlicker 2.4s steps(8,end) infinite;
    }
    .runes.left { left: 22px; }
    .runes.right { right: 22px; }
    .runes .inner { writing-mode: vertical-rl; text-orientation: mixed; }

    .title-block {
      position: absolute;
      left: 0;
      right: 0;
      top: 520px;
      z-index: 11;
      text-align: center;
      pointer-events: none;
    }
    .title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 98px;
      font-weight: 400;
      line-height: 0.92;
      letter-spacing: 0.22em;
      color: rgba(245,252,255,0.97);
      text-shadow: 0 0 7px rgba(255,255,255,0.58), 0 0 22px rgba(142,232,255,0.35), 0 0 48px rgba(142,232,255,0.16);
    }
    .subtitle {
      margin-top: 20px;
      color: rgba(142,232,255,0.86);
      font-size: 18px;
      letter-spacing: 0.43em;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(142,232,255,0.30);
    }
    .divider {
      margin: 25px auto 0;
      width: 306px;
      height: 24px;
      position: relative;
    }
    .divider::before, .divider::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 127px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(142,232,255,0.65));
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; transform: scaleX(-1); }
    .divider span {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 20px;
      height: 20px;
      transform: translate(-50%, -50%) rotate(45deg);
      border: 1px solid rgba(142,232,255,0.82);
      box-shadow: 0 0 10px rgba(142,232,255,0.36);
    }

    .menu-grid {
      position: absolute;
      left: 50%;
      top: 785px;
      width: 800px;
      transform: translateX(-50%);
      z-index: 15;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 40px 40px;
    }
    .menu-card {
      position: relative;
      min-height: 138px;
      display: grid;
      place-items: center;
      align-content: center;
      text-decoration: none;
      color: var(--text);
      background: transparent;
      border: 0;
      outline: none;
      isolation: isolate;
    }
    .menu-card::before {
      content: "";
      position: absolute;
      inset: -12px -16px;
      opacity: 0;
      background: radial-gradient(ellipse at center, rgba(142,232,255,0.09), transparent 68%);
      box-shadow: 0 0 18px rgba(142,232,255,0.10), inset 0 0 20px rgba(142,232,255,0.04);
      transition: opacity .18s ease, transform .18s ease;
      transform: scale(0.98);
      z-index: -1;
    }
    .menu-card:hover::before, .menu-card:focus-visible::before { opacity: 1; transform: scale(1); }
    .menu-icon {
      width: 60px;
      height: 60px;
      color: var(--gold);
      margin-bottom: 18px;
      filter: drop-shadow(0 0 8px rgba(142,232,255,0.08));
      transition: transform .18s ease, color .18s ease, filter .18s ease;
    }
    .menu-icon svg { width: 100%; height: 100%; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .menu-label {
      color: rgba(242,250,255,0.86);
      font-size: 18px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      transition: color .18s ease, text-shadow .18s ease;
    }
    .menu-underline {
      width: 28px;
      height: 1px;
      margin-top: 15px;
      background: rgba(230,245,255,0.56);
      box-shadow: 0 0 8px rgba(142,232,255,0.23);
    }
    .menu-card:hover .menu-icon, .menu-card:focus-visible .menu-icon {
      color: rgba(250,245,220,0.98);
      filter: drop-shadow(0 0 12px rgba(142,232,255,0.24));
      transform: translateY(-2px);
    }
    .menu-card:hover .menu-label, .menu-card:focus-visible .menu-label {
      color: rgba(255,255,255,0.96);
      text-shadow: 0 0 12px rgba(142,232,255,0.28);
    }

    .separators {
      position: absolute;
      left: 50%;
      top: 760px;
      width: 800px;
      height: 355px;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
      opacity: 0.64;
      background:
        linear-gradient(90deg, transparent 24.8%, rgba(142,232,255,0.16) 25%, transparent 25.2%, transparent 49.8%, rgba(142,232,255,0.16) 50%, transparent 50.2%, transparent 74.8%, rgba(142,232,255,0.16) 75%, transparent 75.2%),
        linear-gradient(180deg, transparent 47.5%, rgba(142,232,255,0.10) 47.7%, transparent 48%);
    }

    .bottom-sigil {
      position: absolute;
      left: 50%;
      bottom: 44px;
      width: 540px;
      height: 190px;
      transform: translateX(-50%);
      z-index: 8;
      pointer-events: none;
      opacity: 0.73;
      mix-blend-mode: screen;
    }
    .bottom-sigil svg { width: 100%; height: 100%; overflow: visible; }
    .sigil-circle, .sigil-line, .sigil-glyph {
      fill: none;
      stroke: rgba(142,232,255,0.58);
      stroke-width: 1.1;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }
    .sigil-faint { opacity: 0.34; }
    .sigil-ring-1 { animation: rotateCW 25s linear infinite; transform-origin: 270px 110px; }
    .sigil-ring-2 { animation: rotateCCW 18s linear infinite; transform-origin: 270px 110px; }
    .sigil-ring-3 { animation: rotateCW 42s linear infinite; transform-origin: 270px 110px; }
    .sigil-dash { stroke-dasharray: 8 13; animation: dashFlow 12s linear infinite; }

    .ruins {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 260px;
      z-index: 6;
      pointer-events: none;
      opacity: 0.94;

  <script>
    function fitToViewport() {
      const inner = document.getElementById("fit");
      const padding = 8;
      const naturalWidth = 1086;
      const naturalHeight = 1448;
      const scale = Math.min(
        (window.innerWidth - padding) / naturalWidth,
        (window.innerHeight - padding) / naturalHeight,
        1
      );
      inner.style.transform = `translate(-50%, -50%) scale(${Math.max(scale, 0.35)})`;
    }

    window.addEventListener("resize", fitToViewport);
    window.addEventListener("load", fitToViewport);
    requestAnimationFrame(fitToViewport);
    const glyphPoolLeft = ["ᚠ","ᚢ","ᚦ","ᚨ","ᚱ","ᚲ","ᚷ","ᛉ","ᛋ","ᛏ","ᛒ","ᛖ","ᛗ","ᛟ","⌬","⌖","⟡","⋄","⊹","⟢","⟣","⟁","⟐","○","◌"];
    const glyphPoolRight = ["⌬","⌖","⟡","⋄","⊹","⟢","⟣","⟁","⟐","○","◌","ᛞ","ᛃ","ᛇ","ᛚ","ᛜ","ᛝ","✧","✦","⟴","⟲","◈","◎","◇"];

    function randomFrom(pool) {
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function runeText(pool) {
      const len = Math.random() > 0.74 ? 2 : 1;
      let out = "";
      for (let i = 0; i < len; i++) out += randomFrom(pool);
      if (Math.random() > 0.88) out += " " + randomFrom(pool);
      return out;
    }

    function setupRuneRow(row, pool, side, forceGlyph = false) {
      const isGap = !forceGlyph && Math.random() < 0.18;

      row.className = "rune-row" + (isGap ? " rune-gap" : "");
      row.textContent = isGap ? "" : runeText(pool);

      const rowHeight = isGap
        ? 13 + Math.random() * 24
        : 14;

      const opacity = isGap
        ? 0
        : 0.20 + Math.random() * 0.54;

      const shift = side === "left"
        ? -2 + Math.random() * 5
        : -3 + Math.random() * 6;

      row.dataset.h = rowHeight.toFixed(2);
      row.dataset.isGap = isGap ? "1" : "0";
      row.style.setProperty("--o", opacity.toFixed(2));
      row.style.setProperty("--x", `${shift.toFixed(1)}px`);

      row.classList.toggle("hot", !isGap && Math.random() > 0.78);
      row.classList.toggle("gold", !isGap && Math.random() > 0.91);

      return rowHeight;
    }

    function setRuneY(row, y) {
      row.dataset.y = y.toFixed(2);
      row.style.setProperty("--y", `${y.toFixed(2)}px`);
    }

    function mutateRuneRows(rows, pool) {
      const glyphRows = rows.filter(row => row.dataset.isGap !== "1");
      if (!glyphRows.length) return;

      const count = Math.max(1, Math.floor(glyphRows.length * 0.06));

      for (let i = 0; i < count; i++) {
        const row = glyphRows[Math.floor(Math.random() * glyphRows.length)];
        row.textContent = runeText(pool);
        row.style.setProperty("--o", (0.20 + Math.random() * 0.54).toFixed(2));
        row.classList.toggle("hot", Math.random() > 0.78);
        row.classList.toggle("gold", Math.random() > 0.91);
      }
    }

    function initRuneColumn(containerId, pool, side, visibleHeight, speed) {
      const container = document.getElementById(containerId);
      if (!container) return;

      container.innerHTML = `<div class="rune-flow"></div>`;
      const flow = container.querySelector(".rune-flow");
      const rows = [];

      let y = -34;
      while (y < visibleHeight + 72) {
        const row = document.createElement("span");
        setupRuneRow(row, pool, side, rows.length < 4);
        setRuneY(row, y);
        flow.appendChild(row);
        rows.push(row);
        y += parseFloat(row.dataset.h);
      }

      let last = performance.now();
      let mutateTimer = 0;

      function frame(now) {
        const dt = Math.min((now - last) / 1000, 0.05);
        last = now;
        mutateTimer += dt;

        let topY = Infinity;

        for (const row of rows) {
          const nextY = parseFloat(row.dataset.y) + speed * dt;
          setRuneY(row, nextY);
          if (nextY < topY) topY = nextY;
        }

        if (mutateTimer > 0.9) {
          mutateTimer = 0;
          mutateRuneRows(rows, pool);
        }

        for (const row of rows) {
          const rowY = parseFloat(row.dataset.y);
          const rowHeight = parseFloat(row.dataset.h);

          if (rowY > visibleHeight + 20) {
            const newHeight = setupRuneRow(row, pool, side);
            const newY = topY - newHeight;
            setRuneY(row, newY);
            topY = newY;
          }
        }

        requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);
    }

    function initRitualRunes() {
      const svg = document.querySelector('.ritual-system svg');
      if (!svg) return;
      const ns = 'http://www.w3.org/2000/svg';
      const pools = {
        cyan: ["ᚠ","ᚢ","ᚦ","ᚨ","ᚱ","ᚲ","ᚷ","ᛉ","ᛋ","ᛏ","ᛒ","ᛖ","ᛗ","ᛟ","⌬","⌖","⟡","⋄","⟁","⟐"],
        gold: ["⟡","⌖","⟁","⟐","◈","◎","◇","ᚱ","ᚨ","ᚲ","ᛟ"]
      };

      const configs = [
        { pathId: 'ritualOuterFrontArc', groupId: 'ritualOuterFrontRunes', count: 20, speed: 10, className: 'ritual-rune-glyph', pool: pools.cyan },
        { pathId: 'ritualOuterBackArc',  groupId: 'ritualOuterBackRunes',  count: 16, speed: -7, className: 'ritual-rune-glyph back', pool: pools.cyan },
        { pathId: 'ritualMiddleFrontArc', groupId: 'ritualMiddleFrontRunes', count: 16, speed: -11, className: 'ritual-rune-glyph gold', pool: pools.gold },
        { pathId: 'ritualMiddleBackArc',  groupId: 'ritualMiddleBackRunes',  count: 12, speed: 8, className: 'ritual-rune-glyph back', pool: pools.cyan },
        { pathId: 'ritualInnerFrontArc', groupId: 'ritualInnerFrontRunes', count: 12, speed: 12.5, className: 'ritual-rune-glyph', pool: pools.cyan },
        { pathId: 'ritualInnerBackArc',  groupId: 'ritualInnerBackRunes',  count: 9, speed: -9, className: 'ritual-rune-glyph gold', pool: pools.gold }
      ];

      const rings = configs.map((cfg, ringIndex) => {
        const path = svg.querySelector('#' + cfg.pathId);
        const group = svg.querySelector('#' + cfg.groupId);
        if (!path || !group) return null;
        const length = path.getTotalLength();
        const gap = length / cfg.count;
        const items = [];

        for (let i = 0; i < cfg.count; i++) {
          const t = document.createElementNS(ns, 'text');
          t.setAttribute('class', cfg.className);
          t.textContent = cfg.pool[(i + ringIndex * 3) % cfg.pool.length];
          group.appendChild(t);
          items.push({ el: t, base: i * gap, charIndex: (i + ringIndex * 3) % cfg.pool.length });
        }

        return { ...cfg, path, length, items };
      }).filter(Boolean);

      function edgeFade(n) {
        const edge = 0.10;
        if (n < edge) return n / edge;
        if (n > 1 - edge) return (1 - n) / edge;
        return 1;
      }

      function tick(now) {
        const t = now * 0.001;
        for (const ring of rings) {
          for (const item of ring.items) {
            const pos = ((item.base + t * ring.speed) % ring.length + ring.length) % ring.length;
            const next = (pos + 0.6) % ring.length;
            const pt = ring.path.getPointAtLength(pos);
            const pt2 = ring.path.getPointAtLength(next);
            const angle = Math.atan2(pt2.y - pt.y, pt2.x - pt.x) * 180 / Math.PI;
            const n = pos / ring.length;
            const fade = Math.max(0, Math.min(1, edgeFade(n)));
            const wobble = 0.88 + 0.18 * Math.sin(t * 1.4 + item.base * 0.03);
            item.el.setAttribute('transform', `translate(${pt.x.toFixed(2)} ${pt.y.toFixed(2)}) rotate(${angle.toFixed(2)})`);
            item.el.style.opacity = (fade * wobble).toFixed(3);

            if ((Math.floor((t * Math.abs(ring.speed) + item.base) / (ring.length * 0.32)) % 17) === 0) {
              item.el.textContent = ring.pool[(item.charIndex + Math.floor(t * 0.9)) % ring.pool.length];
            }
          }
        }
        requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    }

    initRitualRunes();

    initRuneColumn("runesLeft", glyphPoolLeft, "left", 470, 12.5);
    initRuneColumn("runesRight", glyphPoolRight, "right", 530, 11.2);
  </script>

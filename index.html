<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ryo System Hauptmenü</title>
  <style>
    :root {
      --notion-bg: #191919;
      --deep: #02070a;
      --deep-2: #061014;
      --cyan: rgba(142, 232, 255, 0.78);
      --cyan-strong: rgba(218, 252, 255, 0.96);
      --cyan-soft: rgba(142, 232, 255, 0.24);
      --cyan-faint: rgba(142, 232, 255, 0.08);
      --gold: rgba(230, 216, 178, 0.83);
      --text: rgba(242, 250, 255, 0.93);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--notion-bg);
      font-family: Calibri, Arial, Helvetica, sans-serif;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #191919;
    }

    .fit {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1086px;
      height: 1448px;
      transform-origin: center center;
      will-change: transform;
    }

    .system {
      position: relative;
      width: 1086px;
      height: 1448px;
      overflow: hidden;
      border: 1px solid rgba(142,232,255,0.22);
      background:
        radial-gradient(ellipse at 50% 24%, rgba(102, 221, 255, 0.105), transparent 24%),
        radial-gradient(ellipse at 50% 82%, rgba(102, 221, 255, 0.08), transparent 34%),
        linear-gradient(180deg, rgba(7, 16, 20, 0.96), rgba(2, 8, 11, 0.985) 54%, rgba(3, 8, 11, 1));
      box-shadow:
        inset 0 0 90px rgba(0,0,0,0.86),
        inset 0 0 38px rgba(142,232,255,0.045),
        0 0 14px rgba(142,232,255,0.08);
      isolation: isolate;
      color: var(--text);
    }

    .stars,
    .dust,
    .mist,
    .glyph-noise {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .stars {
      z-index: 0;
      opacity: 0.34;
      background-image:
        radial-gradient(circle, rgba(180, 252, 255, 0.76) 0 0.8px, transparent 1.7px),
        radial-gradient(circle, rgba(255, 236, 190, 0.38) 0 0.65px, transparent 1.5px);
      background-size: 48px 48px, 113px 113px;
      background-position: 0 0, 33px 26px;
      animation: starDrift 48s linear infinite;
    }

    .dust {
      z-index: 1;
      opacity: 0.22;
      background:
        radial-gradient(ellipse at 18% 58%, rgba(90, 220, 255, 0.17), transparent 32%),
        radial-gradient(ellipse at 83% 57%, rgba(90, 220, 255, 0.14), transparent 34%),
        radial-gradient(ellipse at 50% 42%, rgba(140, 235, 255, 0.08), transparent 42%);
      filter: blur(18px);
      animation: nebulaBreathe 12s ease-in-out infinite;
    }

    .mist {
      z-index: 2;
      opacity: 0.18;
      background:
        linear-gradient(115deg, transparent, rgba(255,255,255,0.06), transparent 42%),
        repeating-linear-gradient(0deg, transparent 0 21px, rgba(142,232,255,0.018) 22px, transparent 23px);
      transform: translateX(-120%);
      mix-blend-mode: screen;
      animation: slowMist 13s ease-in-out infinite;
    }

    .glyph-noise {
      z-index: 3;
      opacity: 0.06;
      background:
        repeating-linear-gradient(90deg, transparent 0 34px, rgba(142,232,255,0.12) 35px, transparent 36px),
        repeating-linear-gradient(0deg, transparent 0 51px, rgba(142,232,255,0.08) 52px, transparent 53px);
      mix-blend-mode: screen;
    }

    .frame {
      position: absolute;
      inset: 18px;
      z-index: 20;
      pointer-events: none;
      border: 1px solid rgba(142,232,255,0.20);
      box-shadow: inset 0 0 34px rgba(142,232,255,0.028);
    }

    .frame::before,
    .frame::after {
      content: "";
      position: absolute;
      width: 130px;
      height: 130px;
      border-color: rgba(142,232,255,0.45);
      border-style: solid;
      filter: drop-shadow(0 0 8px rgba(142,232,255,0.18));
    }
    .frame::before { left: 14px; top: 14px; border-width: 2px 0 0 2px; }
    .frame::after { right: 14px; bottom: 14px; border-width: 0 2px 2px 0; }

    .frame-extra {
      position: absolute;
      inset: 28px;
      z-index: 21;
      pointer-events: none;
    }
    .frame-extra::before,
    .frame-extra::after {
      content: "";
      position: absolute;
      width: 110px;
      height: 82px;
      border-color: rgba(142,232,255,0.42);
      border-style: solid;
    }
    .frame-extra::before { right: 0; top: 0; border-width: 2px 2px 0 0; }
    .frame-extra::after { left: 0; bottom: 0; border-width: 0 0 2px 2px; }

    .arcfield {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      mix-blend-mode: screen;
    }
    .arcfield svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    .arc {
      fill: none;
      stroke: rgba(142,232,255,0.18);
      stroke-width: 1.05;
      vector-effect: non-scaling-stroke;
    }
    .arc.gold { stroke: rgba(230,216,178,0.22); }
    .arc.faint { stroke: rgba(142,232,255,0.09); }
    .arc.dash { stroke-dasharray: 4 13; animation: dashFlow 16s linear infinite; }
    .arc.dash2 { stroke-dasharray: 20 18; animation: dashFlow 22s linear infinite reverse; }
    .tick {
      stroke: rgba(142,232,255,0.16);
      stroke-width: 1;
      vector-effect: non-scaling-stroke;
      animation: tickPulse 5s ease-in-out infinite;
    }
    .tick.major { stroke: rgba(210,250,255,0.30); stroke-width: 1.2; }
    .arc-rot-a { animation: rotateCW 90s linear infinite; transform-origin: 543px 415px; }
    .arc-rot-b { animation: rotateCCW 120s linear infinite; transform-origin: 543px 415px; }

    .dragon {
      position: absolute;
      left: 50%;
      top: 132px;
      width: 610px;
      height: 610px;
      transform: translateX(-50%);
      z-index: 5;
      opacity: 0.46;
      pointer-events: none;
      mix-blend-mode: screen;
      filter:
        brightness(0.70)
        contrast(1.16)
        saturate(0.9)
        drop-shadow(0 0 18px rgba(142,232,255,0.10))
        drop-shadow(0 0 46px rgba(0,0,0,0.74));
      animation: dragonBreathe 8.5s ease-in-out infinite;
    }

    .dragon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .dragon::before {
      content: "";
      position: absolute;
      inset: 13%;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(3, 18, 23, 0.64), transparent 64%);
      filter: blur(18px);
      z-index: -1;
      opacity: 0.72;
    }

    .dragon-eye-overlay {
      position: absolute;
      left: 23.7%;
      top: 35.7%;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255,255,255,1) 0 12%, rgba(168,244,255,0.96) 25%, rgba(72,210,255,0.68) 42%, transparent 72%);
      filter:
        drop-shadow(0 0 7px rgba(255,255,255,0.85))
        drop-shadow(0 0 16px rgba(142,232,255,0.95))
        drop-shadow(0 0 30px rgba(142,232,255,0.36));
      opacity: 0.72;
      animation: dragonEyePulse 2.35s ease-in-out infinite;
    }

    .dragon-eye-overlay::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 58px;
      height: 1px;
      transform: translate(-50%, -50%);
      background: linear-gradient(90deg, transparent, rgba(168,244,255,0.42), transparent);
      filter: drop-shadow(0 0 8px rgba(142,232,255,0.46));
      opacity: 0.42;
      animation: dragonEyeLine 3.6s ease-in-out infinite;
    }

    .spine {
      position: absolute;
      left: 50%;
      top: 0;
      width: 2px;
      height: 100%;
      transform: translateX(-50%);
      z-index: 7;
      pointer-events: none;
      background: linear-gradient(180deg, transparent, rgba(142,232,255,0.18) 8%, rgba(255,255,255,0.82) 16%, rgba(142,232,255,0.20) 45%, rgba(142,232,255,0.13) 75%, rgba(255,255,255,0.88) 93%, transparent);
      filter: drop-shadow(0 0 13px rgba(142,232,255,0.72));
      animation: spinePulse 4.2s ease-in-out infinite;
    }

    .top-node {
      position: absolute;
      left: 50%;
      top: 205px;
      width: 126px;
      height: 126px;
      transform: translate(-50%, -50%);
      z-index: 9;
      pointer-events: none;
      mix-blend-mode: screen;
    }
    .top-node .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(205,250,255,0.52);
      box-shadow: 0 0 12px rgba(142,232,255,0.24), inset 0 0 10px rgba(142,232,255,0.10);
    }
    .top-node .r1 { inset: 0; animation: rotateCW 12s linear infinite; }
    .top-node .r2 { inset: 18px; animation: rotateCCW 8s linear infinite; }
    .top-node .r3 { inset: 36px; animation: rotateCW 5s linear infinite; }
    .top-node .core {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 24px;
      height: 24px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, #fff, #9ceeff 40%, transparent 72%);
      box-shadow: 0 0 16px rgba(255,255,255,0.86), 0 0 44px rgba(142,232,255,0.82);
      animation: orbPulse 2.8s ease-in-out infinite;
    }

    .woven {
      position: absolute;
      left: 50%;
      top: 50px;
      width: 170px;
      height: 320px;
      transform: translateX(-50%);
      z-index: 8;
      pointer-events: none;
      opacity: 0.60;
      mix-blend-mode: screen;
    }
    .woven svg { width: 100%; height: 100%; overflow: visible; }
    .woven path {
      fill: none;
      stroke: rgba(164,240,255,0.44);
      stroke-width: 1.25;
      stroke-linecap: round;
      stroke-dasharray: 5 15;
      filter: drop-shadow(0 0 8px rgba(142,232,255,0.28));
      animation: dashFlow 7s linear infinite;
    }
    .woven path:nth-child(2) { animation-direction: reverse; animation-duration: 9s; opacity: 0.75; }
    .woven path:nth-child(3) { animation-duration: 13s; opacity: 0.50; }

    .runes {
      position: absolute;
      z-index: 12;
      top: 395px;
      width: 36px;
      height: 430px;
      color: rgba(155,232,255,0.38);
      font-family: Consolas, "Courier New", monospace;
      font-size: 15px;
      line-height: 1.08;
      text-shadow: 0 0 9px rgba(142,232,255,0.25);
      white-space: pre;
      overflow: hidden;
      user-select: none;
      mix-blend-mode: screen;
      animation: runeFlicker 2.4s steps(8,end) infinite;
    }
    .runes.left { left: 22px; }
    .runes.right { right: 22px; }
    .runes .inner { writing-mode: vertical-rl; text-orientation: mixed; }

    .title-block {
      position: absolute;
      left: 0;
      right: 0;
      top: 520px;
      z-index: 11;
      text-align: center;
      pointer-events: none;
    }
    .title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 98px;
      font-weight: 400;
      line-height: 0.92;
      letter-spacing: 0.22em;
      color: rgba(245,252,255,0.97);
      text-shadow: 0 0 7px rgba(255,255,255,0.58), 0 0 22px rgba(142,232,255,0.35), 0 0 48px rgba(142,232,255,0.16);
    }
    .subtitle {
      margin-top: 20px;
      color: rgba(142,232,255,0.86);
      font-size: 18px;
      letter-spacing: 0.43em;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(142,232,255,0.30);
    }
    .divider {
      margin: 25px auto 0;
      width: 306px;
      height: 24px;
      position: relative;
    }
    .divider::before, .divider::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 127px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(142,232,255,0.65));
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; transform: scaleX(-1); }
    .divider span {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 20px;
      height: 20px;
      transform: translate(-50%, -50%) rotate(45deg);
      border: 1px solid rgba(142,232,255,0.82);
      box-shadow: 0 0 10px rgba(142,232,255,0.36);
    }

    .menu-grid {
      position: absolute;
      left: 50%;
      top: 785px;
      width: 800px;
      transform: translateX(-50%);
      z-index: 15;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 40px 40px;
    }
    .menu-card {
      position: relative;
      min-height: 138px;
      display: grid;
      place-items: center;
      align-content: center;
      text-decoration: none;
      color: var(--text);
      background: transparent;
      border: 0;
      outline: none;
      isolation: isolate;
    }
    .menu-card::before {
      content: "";
      position: absolute;
      inset: -12px -16px;
      opacity: 0;
      background: radial-gradient(ellipse at center, rgba(142,232,255,0.09), transparent 68%);
      box-shadow: 0 0 18px rgba(142,232,255,0.10), inset 0 0 20px rgba(142,232,255,0.04);
      transition: opacity .18s ease, transform .18s ease;
      transform: scale(0.98);
      z-index: -1;
    }
    .menu-card:hover::before, .menu-card:focus-visible::before { opacity: 1; transform: scale(1); }
    .menu-icon {
      width: 60px;
      height: 60px;
      color: var(--gold);
      margin-bottom: 18px;
      filter: drop-shadow(0 0 8px rgba(142,232,255,0.08));
      transition: transform .18s ease, color .18s ease, filter .18s ease;
    }
    .menu-icon svg { width: 100%; height: 100%; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .menu-label {
      color: rgba(242,250,255,0.86);
      font-size: 18px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      transition: color .18s ease, text-shadow .18s ease;
    }
    .menu-underline {
      width: 28px;
      height: 1px;
      margin-top: 15px;
      background: rgba(230,245,255,0.56);
      box-shadow: 0 0 8px rgba(142,232,255,0.23);
    }
    .menu-card:hover .menu-icon, .menu-card:focus-visible .menu-icon {
      color: rgba(250,245,220,0.98);
      filter: drop-shadow(0 0 12px rgba(142,232,255,0.24));
      transform: translateY(-2px);
    }
    .menu-card:hover .menu-label, .menu-card:focus-visible .menu-label {
      color: rgba(255,255,255,0.96);
      text-shadow: 0 0 12px rgba(142,232,255,0.28);
    }

    .separators {
      position: absolute;
      left: 50%;
      top: 760px;
      width: 800px;
      height: 355px;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
      opacity: 0.64;
      background:
        linear-gradient(90deg, transparent 24.8%, rgba(142,232,255,0.16) 25%, transparent 25.2%, transparent 49.8%, rgba(142,232,255,0.16) 50%, transparent 50.2%, transparent 74.8%, rgba(142,232,255,0.16) 75%, transparent 75.2%),
        linear-gradient(180deg, transparent 47.5%, rgba(142,232,255,0.10) 47.7%, transparent 48%);
    }

    .bottom-sigil {
      position: absolute;
      left: 50%;
      bottom: 44px;
      width: 540px;
      height: 190px;
      transform: translateX(-50%);
      z-index: 8;
      pointer-events: none;
      opacity: 0.73;
      mix-blend-mode: screen;
    }
    .bottom-sigil svg { width: 100%; height: 100%; overflow: visible; }
    .sigil-circle, .sigil-line, .sigil-glyph {
      fill: none;
      stroke: rgba(142,232,255,0.58);
      stroke-width: 1.1;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }
    .sigil-faint { opacity: 0.34; }
    .sigil-ring-1 { animation: rotateCW 25s linear infinite; transform-origin: 270px 110px; }
    .sigil-ring-2 { animation: rotateCCW 18s linear infinite; transform-origin: 270px 110px; }
    .sigil-ring-3 { animation: rotateCW 42s linear infinite; transform-origin: 270px 110px; }
    .sigil-dash { stroke-dasharray: 8 13; animation: dashFlow 12s linear infinite; }

    .ruins {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 260px;
      z-index: 6;
      pointer-events: none;
      opacity: 0.94;
      background:
        linear-gradient(160deg, transparent 0 10%, rgba(0,0,0,0.82) 10.5% 18%, transparent 18.4%),
        linear-gradient(206deg, transparent 0 12%, rgba(0,0,0,0.74) 12.5% 20%, transparent 20.4%),
        linear-gradient(180deg, transparent 0, rgba(0,0,0,0.94) 78%);
      clip-path: polygon(0 44%, 5% 56%, 10% 47%, 15% 39%, 22% 61%, 30% 44%, 39% 67%, 50% 49%, 61% 69%, 70% 45%, 78% 63%, 86% 39%, 94% 58%, 100% 46%, 100% 100%, 0 100%);
    }
    .ruins::before, .ruins::after {
      content: "";
      position: absolute;
      bottom: 0;
      width: 260px;
      height: 220px;
      background: rgba(0,0,0,0.68);
      clip-path: polygon(0 100%, 0 60%, 10% 52%, 20% 70%, 30% 40%, 42% 88%, 54% 32%, 64% 70%, 75% 54%, 100% 100%);
    }
    .ruins::before { left: 0; }
    .ruins::after { right: 0; transform: scaleX(-1); }

    .debris {
      position: absolute;
      inset: 0;
      z-index: 7;
      pointer-events: none;
      opacity: 0.44;
      background:
        radial-gradient(ellipse at 8% 70%, rgba(0,0,0,0.9) 0 8px, transparent 9px),
        radial-gradient(ellipse at 16% 77%, rgba(0,0,0,0.85) 0 5px, transparent 6px),
        radial-gradient(ellipse at 89% 72%, rgba(0,0,0,0.88) 0 9px, transparent 10px),
        radial-gradient(ellipse at 76% 80%, rgba(0,0,0,0.76) 0 4px, transparent 5px);
      animation: debrisFloat 12s ease-in-out infinite;
    }

    @keyframes dragonBreathe {
      0%, 100% {
        opacity: 0.40;
        transform: translateX(-50%) scale(0.992);
      }
      50% {
        opacity: 0.52;
        transform: translateX(-50%) scale(1.008);
      }
    }

    @keyframes dragonEyePulse {
      0%, 100% {
        opacity: 0.52;
        transform: scale(0.82);
      }
      50% {
        opacity: 1;
        transform: scale(1.22);
      }
    }

    @keyframes dragonEyeLine {
      0%, 100% {
        opacity: 0.14;
        transform: translate(-50%, -50%) scaleX(0.74);
      }
      48% {
        opacity: 0.45;
        transform: translate(-50%, -50%) scaleX(1.16);
      }
      52% {
        opacity: 0.78;
        transform: translate(-50%, -50%) scaleX(1.32);
      }
    }

    @keyframes starDrift { from { background-position: 0 0, 33px 26px; } to { background-position: 0 640px, 33px 980px; } }
    @keyframes nebulaBreathe { 0%,100% { opacity: .30; transform: scale(1); } 50% { opacity: .54; transform: scale(1.035); } }
    @keyframes slowMist { 0%, 58% { transform: translateX(-120%); opacity: 0; } 70% { opacity: .23; } 100% { transform: translateX(120%); opacity: 0; } }
    @keyframes rotateCW { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes rotateCCW { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes dashFlow { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -260; } }
    @keyframes tickPulse { 0%,100% { opacity: .12; } 50% { opacity: .30; } }
    @keyframes eyePulse { 0%,100% { opacity: .55; transform: scale(.86); } 50% { opacity: 1; transform: scale(1.22); } }
    @keyframes spinePulse { 0%,100% { opacity: .48; } 50% { opacity: .88; } }
    @keyframes orbPulse { 0%,100% { opacity: .62; transform: translate(-50%,-50%) scale(.92); } 50% { opacity: 1; transform: translate(-50%,-50%) scale(1.12); } }
    @keyframes runeFlicker { 0%,100% { opacity: .34; } 18% { opacity: .14; } 38% { opacity: .46; } 56% { opacity: .22; } 76% { opacity: .42; } }
    @keyframes debrisFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; }
    }
  </style>
</head>

<body>
  <div class="stage">
    <div class="fit" id="fit">
      <main class="system">
        <div class="stars"></div>
        <div class="dust"></div>
        <div class="mist"></div>
        <div class="glyph-noise"></div>

        <div class="arcfield" aria-hidden="true">
          <svg viewBox="0 0 1086 1448">
            <g class="arc-rot-a">
              <circle class="arc dash" cx="543" cy="415" r="452"/>
              <circle class="arc faint" cx="543" cy="415" r="405"/>
              <path class="arc gold" d="M96 415a447 447 0 0 1 894 0"/>
              <line class="tick major" x1="543" y1="2" x2="543" y2="16" transform="rotate(0 543 415)"/>
              <line class="tick " x1="543" y1="2" x2="543" y2="6" transform="rotate(5 543 415)"/>
              <line class="tick " x1="543" y1="2" x2="543" y2="6" transform="rotate(10 543 415)"/>
              <line class="tick " x1="543" y1="2" x2="543" y2="10" transform="rotate(15 543 415)"/>
              <line class="tick " x1="543" y1="2" x2="543" y2="6" transform="rotate(20 543 415)"/>
              <line class="tick " x1="543" y1="2" x2="543" y2="6" transform="rotate(25 543 415)"/>
              <line class="tick major" x1="543" y1="2" x2="543" y2="16" transform="rotate(30 543 415)"/>
              <line class="tick " x1="543" y1="2" x2="543" y2="6" transform="rotate(35 543 415)"/>
              <line class="tick " x1="543" y1="2" x2="543" y2="6" transform="rotate(40 543 415)"/>
              <line class="tick " x1="543" y1="2" x2="543" y2="10" transform="rotate(45 543 415)"/>

  <script>
    function fitToViewport() {
      const inner = document.getElementById("fit");
      const padding = 8;
      const naturalWidth = 1086;
      const naturalHeight = 1448;
      const scale = Math.min(
        (window.innerWidth - padding) / naturalWidth,
        (window.innerHeight - padding) / naturalHeight,
        1
      );
      inner.style.transform = `translate(-50%, -50%) scale(${Math.max(scale, 0.35)})`;
    }

    window.addEventListener("resize", fitToViewport);
    window.addEventListener("load", fitToViewport);
    requestAnimationFrame(fitToViewport);

    const glyphPool = ["ᚠ","ᚢ","ᚦ","ᚨ","ᚱ","ᚲ","ᚷ","ᛉ","ᛋ","ᛏ","ᛒ","ᛖ","ᛗ","ᛟ","⌬","⌖","⟡","⋄","⊹","⟢","⟣","⟁","⟐","○","◌"];

    function makeRuneColumn(lines = 36) {
      const out = [];
      for (let i = 0; i < lines; i++) {
        const len = 1 + Math.floor(Math.random() * 3);
        let group = "";
        for (let j = 0; j < len; j++) group += glyphPool[Math.floor(Math.random() * glyphPool.length)];
        out.push(group);
      }
      return out.join("\n");
    }

    function updateRunes() {
      document.getElementById("runesLeft").textContent = makeRuneColumn();
      document.getElementById("runesRight").textContent = makeRuneColumn();
    }

    updateRunes();
    setInterval(updateRunes, 1400);
  </script>
